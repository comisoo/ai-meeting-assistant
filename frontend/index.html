<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Meeting Minutes Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <main class="container">
        <header>
            <h1>AI Meeting Minutes <span class="gradient-text">Assistant</span></h1>
            <p>Transform unstructured conversations into structured corporate assets.</p>
        </header>

        <section class="upload-section glass-panel">
            <div id="drop-zone" class="drop-zone">
                <div class="icon">📁</div>
                <p>Drag & drop your meeting audio/transcript here</p>
                <p class="subtitle">or click to browse files</p>
                <input type="file" id="file-input" hidden accept="audio/*,.txt,.pdf,.docx">
            </div>
            
            <div class="options">
                <label for="template-select">Meeting Template:</label>
                <select id="template-select">
                    <option value="daily">Agile Daily Stand-up</option>
                    <option value="brainstorm">Brainstorming Session</option>
                    <option value="client">Client Pitch</option>
                    <option value="general" selected>General Meeting</option>
                </select>
                <button id="process-btn" class="primary-btn" disabled>Generate Minutes</button>
            </div>
        </section>

        <section id="processing-status" class="processing-status hidden glass-panel mt-2">
            <div class="status-steps">
                <div class="step" id="step-upload">Uploading...</div>
                <div class="step" id="step-transcribe">Transcription (Whisper)</div>
                <div class="step" id="step-summarize">Summarizing (LangGraph)</div>
                <div class="step" id="step-extract">Extracting Action Items</div>
            </div>
            <div class="loader-bar"><div class="fill"></div></div>
        </section>

        <!-- Results Section will be dynamically populated -->
    </main>
    <script src="script.js"></script>
</body>
</html>
